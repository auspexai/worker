name: Release

# Fires on version tags (e.g., v0.1.0). The tag is the trigger; the
# Maintainer is expected to push it from a state where the main-branch
# CI was green.
#
# Outputs a GitHub release with:
#   - auspexai_worker-<version>-py3-none-any.whl  (pipx-installable Python wheel)
#   - auspexai_worker-<version>.tar.gz             (source distribution)
#   - auspexai-worker_<version>_amd64.deb          (Debian package)
#   - <artifact>.sig + <artifact>.cert per artifact (Sigstore keyless via OIDC)
#   - SHA256SUMS                                   (legacy checksum file)
#
# Trust path: see auspexai/.github/security/AUTHORIZED_SIGNERS.md.
# Verification: cosign verify-blob with --certificate-identity-regexp
# scoped to the auspexai org. Per Principles & Scope §5.16.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub release + upload assets
  id-token: write   # OIDC token for Sigstore keyless signing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, and publish
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout source at tag
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Build Python wheel + sdist
        run: |
          uv build
          ls -la dist/

      - name: Guard — version is a clean release matching the tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          WHEEL=$(ls dist/auspexai_worker-*.whl)
          BUILT_VERSION=$(basename "$WHEEL" | cut -d- -f2)
          echo "tag=$TAG_VERSION  built=$BUILT_VERSION"
          # hatch-vcs emits a clean X.Y.Z only when HEAD is exactly the tag with
          # a clean tree; dev/local/dirty builds (e.g. 0.1.9.dev2+gSHA) are
          # rejected so a non-release artifact can never ship. version_provenance.md.
          if [ "$BUILT_VERSION" = "0.0.0" ] || ! printf '%s' "$BUILT_VERSION" | grep -qE '^[0-9]+(\.[0-9]+)+$'; then
            echo "::error::built version '$BUILT_VERSION' is not a clean release (dev/local/dirty, or 0.0.0 version-detection fallback) — the tag must be on HEAD with a clean tree."
            exit 1
          fi
          if [ "$BUILT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::built version '$BUILT_VERSION' != tag '$TAG_VERSION'."
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Install Debian build toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dh-virtualenv debhelper devscripts dpkg-dev \
            python3-venv python3-dev python3.12-venv python3.12-dev \
            python3-pip build-essential

      - name: Stamp Debian changelog version from the tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # The .deb version comes from debian/changelog (hand-maintained, does
          # NOT follow hatch-vcs). Stamp it from the tag so the .deb version
          # matches the wheel/tag. Native package → bare (X.Y.Z). version_provenance.md.
          sed -i "1s/^auspexai-worker ([^)]*) [A-Za-z]*/auspexai-worker (${TAG_VERSION}) stable/" debian/changelog
          head -1 debian/changelog

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b
          ls -la ../auspexai-worker_*.deb
          test -f "../auspexai-worker_${GITHUB_REF_NAME#v}_amd64.deb" \
            || { echo "::error::.deb version does not match tag ${GITHUB_REF_NAME#v}"; exit 1; }

      - name: Stage artifacts into dist/
        run: |
          mv ../auspexai-worker_*.deb dist/
          mv ../auspexai-worker_*.buildinfo dist/ 2>/dev/null || true
          mv ../auspexai-worker_*.changes dist/ 2>/dev/null || true
          ls -la dist/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.5.0'

      - name: Sign artifacts (Sigstore keyless via GitHub OIDC)
        run: |
          shopt -s nullglob
          for artifact in dist/auspexai_worker-*.whl \
                          dist/auspexai_worker-*.tar.gz \
                          dist/auspexai-worker_*.deb; do
            echo "::group::Signing $(basename "$artifact")"
            cosign sign-blob --yes \
              --output-signature "$artifact.sig" \
              --output-certificate "$artifact.cert" \
              "$artifact"
            echo "::endgroup::"
          done
          ls -la dist/

      - name: Compute SHA256SUMS
        run: |
          (cd dist && sha256sum auspexai* | grep -vE '\.(sig|cert)$' > SHA256SUMS)
          cat dist/SHA256SUMS

      - name: Verify own signatures (self-check)
        run: |
          shopt -s nullglob
          for artifact in dist/auspexai_worker-*.whl \
                          dist/auspexai_worker-*.tar.gz \
                          dist/auspexai-worker_*.deb; do
            echo "::group::Verifying $(basename "$artifact")"
            cosign verify-blob \
              --certificate-identity-regexp='^https://github\.com/auspexai/.+/\.github/workflows/.+@.+$' \
              --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \
              --signature "$artifact.sig" \
              --certificate "$artifact.cert" \
              "$artifact"
            echo "::endgroup::"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/auspexai_worker-*.whl
            dist/auspexai_worker-*.tar.gz
            dist/auspexai-worker_*.deb
            dist/*.sig
            dist/*.cert
            dist/SHA256SUMS
          body: |
            AuspexAI Worker ${{ env.version }}.

            ## Install

            ```bash
            # Debian / Ubuntu (Phase 1 supported target: Ubuntu 24.04+)
            sudo apt install ./auspexai-worker_${{ env.version }}_amd64.deb

            # Or via pipx (Linux x86_64 + ARM64)
            pipx install auspexai_worker-${{ env.version }}-py3-none-any.whl
            ```

            ## Verify before installing

            ```bash
            cosign verify-blob \
              --certificate-identity-regexp='^https://github\.com/auspexai/.+/\.github/workflows/.+@.+$' \
              --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \
              --signature auspexai-worker_${{ env.version }}_amd64.deb.sig \
              --certificate auspexai-worker_${{ env.version }}_amd64.deb.cert \
              auspexai-worker_${{ env.version }}_amd64.deb
            ```

            The signature chain anchors at the AuspexAI Maintainer's GitHub
            OIDC identity. Trust roster: [AUTHORIZED_SIGNERS.md](https://github.com/auspexai/.github/blob/main/security/AUTHORIZED_SIGNERS.md).
            Receipt verification (separate signing chain): per [Principles & Scope §5.16](https://github.com/auspexai).
