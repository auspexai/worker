name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Test (pytest)
        run: uv run pytest -v

      - name: Build (sdist + wheel)
        run: uv build

  build-deb:
    name: Build .deb (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    # Don't gate on `test` — packaging issues should surface independently
    # of unit-test status so both signal classes are visible per PR.
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Debian build toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dh-virtualenv debhelper devscripts dpkg-dev \
            python3-venv python3-dev python3.12-venv python3.12-dev \
            python3-pip build-essential

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b

      - name: Move .deb into workspace + inspect
        run: |
          mkdir -p dist
          mv ../auspexai-worker_*.deb dist/
          ls -lh dist/
          dpkg -I dist/auspexai-worker_*.deb

      - name: Upload .deb as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: auspexai-worker-deb
          path: dist/*.deb
          retention-days: 7
