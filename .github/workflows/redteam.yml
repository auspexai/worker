name: Red-team (STRICT sandbox)

# The full §41(a) escape proof — all five vectors, INCLUDING the cgroup memory +
# fork-bomb caps that only fire under a delegated cgroup subtree. It therefore
# runs on a SELF-HOSTED runner with a worker-like environment (bubblewrap +
# libseccomp + a systemd user manager with cgroup delegation), labelled
# `sandbox-redteam`. `make redteam` sets AUSPEXAI_REDTEAM_REQUIRE_FULL=1, so a
# missing precondition fails the run rather than skipping — a green check here
# means all five vectors actually fired.
#
# SECURITY — this repo is PUBLIC. A self-hosted runner must never execute
# untrusted fork-PR code, so this workflow deliberately does NOT trigger on
# `pull_request`: only push-to-main (trusted), manual dispatch, and a nightly
# schedule. Provision the runner EPHEMERAL, low-privilege, on a DISPOSABLE VM
# ("virtual mayhem") — never a production worker. The runner's user needs
# `loginctl enable-linger` so `systemd-run --user -p Delegate=yes` has a user
# manager + a delegated cgroup subtree.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *" # nightly ~07:00 UTC

concurrency:
  group: redteam-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  redteam:
    name: STRICT escape proof (self-hosted)
    runs-on: [self-hosted, sandbox-redteam]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Full red-team (all 5 vectors, under cgroup delegation)
        run: make redteam
